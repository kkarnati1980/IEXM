<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/shared-app.css">
    <title>Stall Detail — Organizer</title>
    <style>
      :root {
  --bg: #f5f7fa; --panel: #ffffff; --panel-2: #f9fafb;
  --border: #e5e7eb; --text: #111827; --muted: #6b7280;
  --accent: #2D6A9F; --accent-soft: rgba(45,106,159,0.10);
  --accent-2: #2563eb; --good: #16a34a; --warn: #d97706; --bad: #dc2626;
}
      *{box-sizing:border-box;}
      body{margin:0;font-family:"IBM Plex Sans",sans-serif;color:var(--text);background: var(--bg);min-height:100vh;}
      .shell{max-width:1440px;margin:0 auto;padding:18px 24px 0;}
      .shell-bar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
      .shell-title{display:grid;gap:4px;}
      .shell-title strong{font-size:1.1rem;}
      .shell-nav{display:flex;gap:10px;flex-wrap:wrap;}
      .shell-nav a{display:inline-flex;align-items:center;padding:10px 13px;border-radius:999px;border:1px solid var(--border);background:var(--panel);color:var(--text);text-decoration:none;font-size:14px;}
      .eyebrow{display:inline-block;margin-bottom:8px;padding:5px 10px;border-radius:999px;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;background:var(--accent-soft);color:var(--accent-2);}
      main{max-width:900px;margin:0 auto;padding:0 24px 24px;}
      .card{border-radius:22px;padding:22px;background:var(--panel);border:1px solid var(--border);margin-bottom:18px;}
      .status{padding:12px 14px;border-radius:14px;font-size:14px;margin-bottom:14px;}
      .status.ok{background:#dcfce7;color:var(--good);}
      .status.error{background:#fee2e2;color:var(--bad);}
      button{border:0;border-radius:12px;padding:10px 16px;cursor:pointer;font:inherit;font-size:14px;}
      button.primary{background:var(--accent);color:#fff;font-weight:600;}
      button.secondary{background:var(--panel-2);color:var(--text);}
      button.bad{background:#fee2e2;color:var(--bad);}
      button.sm{padding:7px 12px;font-size:12px;}
      button:disabled{opacity:0.4;cursor:default;}
      input,select{width:100%;border-radius:12px;border:1px solid var(--border);background:var(--panel);color:var(--text);padding:10px 12px;font:inherit;}
      input:focus,select:focus{outline:2px solid var(--accent);border-color:transparent;}
      table{width:100%;border-collapse:collapse;}
      th,td{padding:11px;border-bottom:1px solid var(--border);text-align:left;font-size:14px;}
      th{color:var(--muted);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:0.06em;}
      .empty{color:var(--muted);padding:24px;text-align:center;}
      .detail-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);align-items:center;}
      .detail-row:last-child{border-bottom:none;}
      .detail-row label{min-width:140px;font-size:13px;color:var(--muted);}
      .section-head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
      .section-head h3{margin:0;}
      .field{margin-bottom:14px;}
      .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px;}
      #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--good);color:#0a1f1b;padding:12px 20px;border-radius:14px;font-weight:600;font-size:14px;opacity:0;transition:opacity 0.2s;z-index:9999;pointer-events:none;}
      #toast.show{opacity:1;}
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="shell-bar">
        <div class="shell-title">
          <div class="eyebrow">Organizer</div>
          <strong>Stall Detail</strong>
          <span class="muted" id="page-sub">Loading…</span>
        </div>
        <nav class="shell-nav">
          <a href="#" id="back-link">← Event</a>
          <a href="#" id="logout-link" style="color:var(--bad)">Sign out</a>
        </nav>
      </div>
    </div>

    <main>
      <div id="global-status" hidden class="status"></div>

      <!-- Stall Identity -->
      <div class="card">
        <div class="eyebrow">Stall Identity</div>
        <div class="detail-row">
          <label>Stall Code</label>
          <span id="stall-code" style="font-family:monospace;color:var(--muted);">—</span>
        </div>
        <div class="detail-row">
          <label>Name</label>
          <div style="flex:1;display:flex;gap:8px;align-items:center;">
            <input type="text" id="stall-name" style="max-width:300px;">
            <button class="primary sm" id="save-name-btn">Save</button>
          </div>
        </div>
        <div class="detail-row">
          <label>Hall</label>
          <select id="stall-hall" style="max-width:240px;"></select>
          <button class="secondary sm" id="save-hall-btn">Change</button>
        </div>
        <div id="identity-status" hidden class="status" style="margin-top:10px;"></div>
      </div>

      <!-- Linked Vendor Organization -->
      <div class="card">
        <div class="section-head"><h3>Linked Vendor Organization</h3></div>
        <div style="display:flex;gap:10px;align-items:center;">
          <select id="vendor-org-select" style="flex:1;max-width:340px;"></select>
          <button class="primary" id="save-vendor-btn">Save</button>
        </div>
        <div id="vendor-status" hidden class="status" style="margin-top:10px;"></div>
      </div>

      <!-- Vendor Manager Users -->
      <div class="card">
        <div class="section-head">
          <h3>Vendor Manager Users</h3>
          <button class="secondary sm" id="assign-vendor-manager-btn">+ Assign</button>
        </div>
        <div id="vm-status" hidden class="status"></div>
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="vm-tbody"><tr><td colspan="4" class="empty">Loading…</td></tr></tbody>
        </table>
      </div>

      <!-- Device Assignment -->
      <div class="card">
        <div class="section-head">
          <h3>Device Assignment</h3>
          <div style="display:flex;gap:8px;">
            <button class="secondary sm" id="change-device-btn">Change Device</button>
            <button class="bad sm" id="unassign-device-btn">Unassign</button>
          </div>
        </div>
        <div id="device-info">
          <div class="empty">Loading device…</div>
        </div>
      </div>

      <!-- Activity -->
      <div class="card">
        <h3 style="margin:0 0 14px">Activity</h3>
        <div class="detail-row"><label>Total Interactions</label><span id="act-count" class="muted">—</span></div>
        <div class="detail-row"><label>Last Interaction</label><span id="act-last" class="muted">—</span></div>
      </div>
    </main>

    <div id="toast"></div>

    <script type="module">
      import { isAuthenticated, logoutUser } from "../components.js";
      if (!isAuthenticated()) { logoutUser("/login"); throw new Error("unauthenticated"); }
      const params = new URLSearchParams(location.search);
      const apiBase = params.get("apiBase") ?? window.location.origin;
      const token = params.get("token") ?? localStorage.getItem("codex.token") ?? "organizer-token";
      const stallId = params.get("stallId") ?? "";
      const eventId = params.get("eventId") ?? "";

      document.getElementById("logout-link").addEventListener("click", (e) => { e.preventDefault(); logoutUser("/login"); });

      function esc(s) { return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
      function fmt(iso) { return iso ? new Date(iso).toLocaleString() : "—"; }

      function toast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg; el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 2800);
      }
      function showGlobal(msg, type) { const el = document.getElementById("global-status"); el.textContent = msg; el.className = `status ${type}`; el.hidden = false; }
      function showStatus(id, msg, type) { const el = document.getElementById(id); el.textContent = msg; el.className = `status ${type}`; el.hidden = false; }

      async function api(path, options = {}) {
        const res = await fetch(`${apiBase}${path}`, {
          method: options.method ?? "GET",
          headers: { "content-type": "application/json", authorization: `Bearer ${token}` },
          body: options.body ? JSON.stringify(options.body) : undefined
        });
        const payload = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(payload.error ?? `Request failed: ${res.status}`);
        return payload;
      }

      let stallData = null;

      async function load() {
        try {
          const data = await api(`/stalls/${encodeURIComponent(stallId)}`);
          stallData = data.stall ?? data;
          const ev = stallData.event_id ?? eventId;

          document.getElementById("back-link").href =
            `event-detail.html?eventId=${encodeURIComponent(ev)}&token=${encodeURIComponent(token)}&apiBase=${encodeURIComponent(apiBase)}#halls`;
          document.getElementById("page-sub").textContent = stallData.name;
          document.getElementById("stall-code").textContent = stallData.stall_code ?? stallData.code ?? "—";
          document.getElementById("stall-name").value = stallData.name;

          // Load halls for dropdown
          const hallsData = await api(`/events/${encodeURIComponent(ev)}/halls`);
          const halls = hallsData.halls ?? hallsData ?? [];
          const hallSel = document.getElementById("stall-hall");
          hallSel.innerHTML = halls.map(h =>
            `<option value="${esc(h.id)}" ${stallData.hall_id === h.id ? "selected" : ""}>${esc(h.name)}</option>`
          ).join("");

          // Load orgs for vendor assignment
          const orgsData = await api("/orgs");
          const orgs = (orgsData.organizations ?? []).filter(o => o.type === "vendor");
          const orgSel = document.getElementById("vendor-org-select");
          orgSel.innerHTML = `<option value="">— Select vendor org —</option>` +
            orgs.map(o => `<option value="${esc(o.id)}" ${stallData.organization_id === o.id ? "selected" : ""}>${esc(o.name)}</option>`).join("");

          // Load device
          const deviceEl = document.getElementById("device-info");
          if (stallData.device_id) {
            const devData = await api(`/devices/${encodeURIComponent(stallData.device_id)}`).catch(() => null);
            const dev = devData?.device ?? devData;
            deviceEl.innerHTML = dev ? `
              <div class="detail-row"><label>Name</label><span>${esc(dev.name ?? dev.label ?? "—")}</span></div>
              <div class="detail-row"><label>Serial</label><span style="font-family:monospace">${esc(dev.serial ?? dev.id)}</span></div>
              <div class="detail-row"><label>Last Heartbeat</label><span class="muted">${fmt(dev.last_heartbeat_at)}</span></div>
              <div class="detail-row"><label>Battery</label><span class="muted">${dev.battery_level != null ? dev.battery_level + "%" : "—"}</span></div>
            ` : `<div class="empty">Device not found</div>`;
          } else {
            deviceEl.innerHTML = `<div class="empty">No device assigned</div>`;
          }

          // Load vendor managers
          await loadVendorManagers();

        } catch (err) {
          showGlobal(err.message, "error");
        }
      }

      async function loadVendorManagers() {
        try {
          const data = await api(`/stalls/${encodeURIComponent(stallId)}/users`);
          const users = data.users ?? [];
          const tbody = document.getElementById("vm-tbody");
          tbody.innerHTML = users.length === 0
            ? `<tr><td colspan="4" class="empty">No vendor managers assigned to this stall</td></tr>`
            : users.map(u => `
              <tr>
                <td>${esc(u.full_name ?? u.display_name)}</td>
                <td class="muted">${esc(u.email)}</td>
                <td><span class="badge ${esc(u.status)}">${esc(u.status)}</span></td>
                <td><button class="sm bad" onclick="removeVM('${esc(u.id)}','${esc(u.assignment_id)}')">Remove</button></td>
              </tr>`).join("");
        } catch {
          const tbody = document.getElementById("vm-tbody");
          tbody.innerHTML = `<tr><td colspan="4" class="empty">Failed to load</td></tr>`;
        }
      }

      window.removeVM = async (userId, assignmentId) => {
        if (!confirm("Remove vendor manager from this stall?")) return;
        try {
          await api(`/users/${encodeURIComponent(userId)}/roles/${encodeURIComponent(assignmentId)}`, { method: "DELETE" });
          toast("Vendor manager removed");
          loadVendorManagers();
        } catch (err) {
          showStatus("vm-status", err.message, "error");
        }
      };

      document.getElementById("save-name-btn").addEventListener("click", async () => {
        const name = document.getElementById("stall-name").value.trim();
        if (!name) return;
        try {
          await api(`/stalls/${encodeURIComponent(stallId)}`, { method: "PATCH", body: { name } });
          toast("Stall name saved");
        } catch (err) {
          showStatus("identity-status", err.message, "error");
        }
      });

      document.getElementById("save-hall-btn").addEventListener("click", async () => {
        const hallId = document.getElementById("stall-hall").value;
        try {
          await api(`/stalls/${encodeURIComponent(stallId)}`, { method: "PATCH", body: { hall_id: hallId } });
          toast("Hall updated");
        } catch (err) {
          showStatus("identity-status", err.message, "error");
        }
      });

      document.getElementById("save-vendor-btn").addEventListener("click", async () => {
        const orgId = document.getElementById("vendor-org-select").value;
        try {
          await api(`/stalls/${encodeURIComponent(stallId)}`, { method: "PATCH", body: { organization_id: orgId || null } });
          toast("Vendor organization saved");
        } catch (err) {
          showStatus("vendor-status", err.message, "error");
        }
      });

      document.getElementById("assign-vendor-manager-btn").addEventListener("click", () => {
        alert("Assign Vendor Manager — opens RoleAssignmentModal");
      });
      document.getElementById("change-device-btn").addEventListener("click", () => {
        alert("Change Device — opens F.4 device selection modal");
      });
      document.getElementById("unassign-device-btn").addEventListener("click", async () => {
        if (!confirm("Unassign device from this stall?")) return;
        try {
          await api(`/stalls/${encodeURIComponent(stallId)}`, { method: "PATCH", body: { device_id: null } });
          toast("Device unassigned");
          load();
        } catch (err) {
          showGlobal(err.message, "error");
        }
      });

      load();
    </script>
  </body>
</html>

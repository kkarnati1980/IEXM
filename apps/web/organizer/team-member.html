<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Team Member — Organizer</title>
    <style>
      :root{--bg:#101117;--panel:#1a1c25;--panel-2:#14161d;--border:rgba(255,255,255,0.08);--text:#f4f1ea;--muted:#b2ac9f;--accent:#f3c97d;--accent-2:#9fd3c7;--good:#9fd3c7;--warn:#f3c97d;--bad:#ff9f9f;}
      *{box-sizing:border-box;}
      body{margin:0;font-family:"IBM Plex Sans",sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(243,201,125,0.16),transparent 28%),linear-gradient(160deg,var(--bg),#090a0e 66%);min-height:100vh;}
      .shell{max-width:1440px;margin:0 auto;padding:18px 24px 0;}
      .shell-bar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
      .shell-title{display:grid;gap:4px;}
      .shell-title strong{font-size:1.1rem;}
      .shell-nav{display:flex;gap:10px;flex-wrap:wrap;}
      .shell-nav a{display:inline-flex;align-items:center;padding:10px 13px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);text-decoration:none;font-size:14px;}
      .eyebrow{display:inline-block;margin-bottom:8px;padding:5px 10px;border-radius:999px;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;background:rgba(159,211,199,0.12);color:var(--accent-2);}
      main{max-width:900px;margin:0 auto;padding:0 24px 24px;}
      .card{border-radius:22px;padding:22px;background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--border);margin-bottom:18px;}
      .status{padding:12px 14px;border-radius:14px;font-size:14px;margin-bottom:14px;}
      .status.ok{background:rgba(159,211,199,0.16);color:var(--good);}
      .status.error{background:rgba(255,159,159,0.12);color:var(--bad);}
      button{border:0;border-radius:12px;padding:10px 16px;cursor:pointer;font:inherit;font-size:14px;}
      button.primary{background:var(--accent);color:#211503;font-weight:600;}
      button.secondary{background:rgba(255,255,255,0.1);color:var(--text);}
      button.warn{background:rgba(243,201,125,0.16);color:var(--warn);}
      button.bad{background:rgba(255,159,159,0.14);color:var(--bad);}
      button.sm{padding:7px 12px;font-size:12px;}
      button:disabled{opacity:0.4;cursor:default;}
      .badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;border:1px solid var(--border);font-size:12px;}
      .badge.active{color:var(--good);}
      .badge.disabled{color:var(--bad);}
      .badge.pending_invite{color:var(--warn);}
      .detail-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);align-items:baseline;}
      .detail-row:last-child{border-bottom:none;}
      .detail-row label{min-width:140px;font-size:13px;color:var(--muted);}
      .section-head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
      .section-head h3{margin:0;}
      table{width:100%;border-collapse:collapse;}
      th,td{padding:11px;border-bottom:1px solid var(--border);text-align:left;font-size:14px;}
      th{color:var(--muted);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:0.06em;}
      .empty{color:var(--muted);padding:24px;text-align:center;}
      .action-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
      #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--good);color:#0a1f1b;padding:12px 20px;border-radius:14px;font-weight:600;font-size:14px;opacity:0;transition:opacity 0.2s;z-index:9999;pointer-events:none;}
      #toast.show{opacity:1;}
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="shell-bar">
        <div class="shell-title">
          <div class="eyebrow">Organizer</div>
          <strong>Team Member Detail</strong>
          <span class="muted" id="page-sub">Loading…</span>
        </div>
        <nav class="shell-nav">
          <a href="team.html" id="back-link">← Team</a>
        </nav>
      </div>
    </div>

    <main>
      <div id="global-status" hidden class="status"></div>

      <!-- Profile -->
      <div class="card">
        <div class="eyebrow">Member Profile</div>
        <div class="detail-row"><label>Name</label><span id="m-name">—</span></div>
        <div class="detail-row"><label>Email</label><span id="m-email">—</span></div>
        <div class="detail-row"><label>Status</label><span id="m-status">—</span></div>
        <div class="detail-row"><label>Last Login</label><span id="m-last-login" class="muted">—</span></div>
        <div class="detail-row"><label>Created</label><span id="m-created" class="muted">—</span></div>
      </div>

      <!-- Role & Scope -->
      <div class="card">
        <div class="section-head">
          <h3>Role &amp; Scope</h3>
        </div>
        <div id="roles-tbody">
          <div class="empty">Loading role assignments…</div>
        </div>
      </div>

      <!-- Actions -->
      <div class="card">
        <h3 style="margin:0 0 14px">Actions</h3>
        <div class="action-row">
          <button class="bad" id="disable-btn">Disable Account</button>
          <button class="secondary" id="enable-btn" hidden>Enable Account</button>
        </div>
        <div id="action-status" hidden class="status" style="margin-top:12px;"></div>
      </div>
    </main>

    <div id="toast"></div>

    <script type="module">
      const params = new URLSearchParams(location.search);
      const apiBase = params.get("apiBase") ?? (location.port === "8080" ? "http://localhost:8080" : "http://localhost:3000");
      const token = params.get("token") ?? localStorage.getItem("codex.token") ?? "organizer-token";
      const userId = params.get("userId") ?? "";

      document.getElementById("back-link").href = `team.html?token=${encodeURIComponent(token)}&apiBase=${encodeURIComponent(apiBase)}`;

      function esc(s) { return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
      function fmt(iso) { return iso ? new Date(iso).toLocaleString() : "—"; }

      function toast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg; el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 2800);
      }
      function showGlobal(msg, type) {
        const el = document.getElementById("global-status");
        el.textContent = msg; el.className = `status ${type}`; el.hidden = false;
      }
      function showAction(msg, type) {
        const el = document.getElementById("action-status");
        el.textContent = msg; el.className = `status ${type}`; el.hidden = false;
      }

      async function api(path, options = {}) {
        const res = await fetch(`${apiBase}${path}`, {
          method: options.method ?? "GET",
          headers: { "content-type": "application/json", authorization: `Bearer ${token}` },
          body: options.body ? JSON.stringify(options.body) : undefined
        });
        const payload = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(payload.error ?? `Request failed: ${res.status}`);
        return payload;
      }

      let userData = null;

      async function load() {
        try {
          const data = await api(`/users/${encodeURIComponent(userId)}`);
          userData = data;
          document.getElementById("page-sub").textContent = data.display_name ?? data.email;
          document.getElementById("m-name").textContent = data.display_name ?? "—";
          document.getElementById("m-email").textContent = data.email;
          document.getElementById("m-status").innerHTML = `<span class="badge ${esc(data.status)}">${esc(data.status)}</span>`;
          document.getElementById("m-last-login").textContent = fmt(data.last_login_at);
          document.getElementById("m-created").textContent = fmt(data.created_at);

          document.getElementById("disable-btn").hidden = data.status !== "active";
          document.getElementById("enable-btn").hidden = data.status !== "disabled";

          const rolesData = await api(`/users/${encodeURIComponent(userId)}/roles`);
          const assignments = rolesData.role_assignments ?? [];
          const rolesEl = document.getElementById("roles-tbody");
          if (assignments.length === 0) {
            rolesEl.innerHTML = `<div class="empty">No role assignments</div>`;
          } else {
            rolesEl.innerHTML = assignments.map(a => `
              <div class="detail-row">
                <label>Role</label>
                <span><span class="badge">${esc(a.role)}</span>${a.event_id ? ` — Event: <span class="muted">${esc(a.event_id)}</span>` : ""}</span>
                <button class="sm bad" style="margin-left:auto" onclick="removeRole('${esc(a.id)}')">Remove</button>
              </div>
            `).join("");
          }
        } catch (err) {
          showGlobal(err.message, "error");
        }
      }

      window.removeRole = async (assignmentId) => {
        if (!confirm("Remove this role assignment?")) return;
        try {
          await api(`/users/${encodeURIComponent(userId)}/roles/${encodeURIComponent(assignmentId)}`, { method: "DELETE" });
          toast("Role removed");
          load();
        } catch (err) {
          showAction(err.message, "error");
        }
      };

      document.getElementById("disable-btn").addEventListener("click", async () => {
        if (!confirm("Disable this account?")) return;
        try {
          await api(`/users/${encodeURIComponent(userId)}/disable`, { method: "POST", body: {} });
          toast("Account disabled");
          load();
        } catch (err) {
          showAction(err.message, "error");
        }
      });

      document.getElementById("enable-btn").addEventListener("click", async () => {
        try {
          await api(`/users/${encodeURIComponent(userId)}/enable`, { method: "POST", body: {} });
          toast("Account enabled");
          load();
        } catch (err) {
          showAction(err.message, "error");
        }
      });

      load();
    </script>
  </body>
</html>

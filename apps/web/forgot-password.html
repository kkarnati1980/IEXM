<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot password — Codex</title>
    <style>
      :root {
        --bg: #101117;
        --panel: #1a1c25;
        --panel-2: #14161d;
        --border: rgba(255,255,255,0.08);
        --text: #f4f1ea;
        --muted: #b2ac9f;
        --accent: #f3c97d;
        --accent-2: #9fd3c7;
        --good: #9fd3c7;
        --warn: #f3c97d;
        --bad: #ff9f9f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(243, 201, 125, 0.16), transparent 28%),
          linear-gradient(160deg, var(--bg), #090a0e 66%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        border-radius: 22px;
        padding: 32px;
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid var(--border);
        width: 100%;
        max-width: 440px;
        margin: 24px;
      }
      .eyebrow {
        display: inline-block;
        margin-bottom: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: rgba(159, 211, 199, 0.12);
        color: var(--accent-2);
      }
      h1 { margin: 0 0 6px; font-size: 1.4rem; }
      .muted { color: var(--muted); }
      .status {
        margin-bottom: 16px;
        padding: 12px 14px;
        border-radius: 14px;
        font-size: 14px;
      }
      .status.ok { background: rgba(159, 211, 199, 0.16); color: var(--good); }
      .status.error { background: rgba(255, 159, 159, 0.12); color: var(--bad); }
      .field { margin-bottom: 16px; }
      .field label {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.04);
        color: var(--text);
        padding: 11px 12px;
        font: inherit;
        font-size: 15px;
      }
      input:focus { outline: 2px solid var(--accent); border-color: transparent; }
      button {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 13px;
        cursor: pointer;
        font: inherit;
        font-size: 15px;
        font-weight: 600;
      }
      button.primary { background: var(--accent); color: #211503; }
      button:disabled { opacity: 0.4; cursor: default; }
      .back-link {
        display: block;
        margin-top: 16px;
        text-align: center;
        font-size: 14px;
        color: var(--muted);
        text-decoration: none;
      }
      .back-link:hover { color: var(--text); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="eyebrow">Account recovery</div>
      <h1>Forgot password</h1>
      <p class="muted">Enter your email address and we'll send a reset link if an account exists.</p>

      <div id="status" hidden class="status"></div>

      <div id="form-wrap">
        <div class="field">
          <label>Email address</label>
          <input type="email" id="email" autocomplete="email" placeholder="you@example.com">
        </div>
        <button class="primary" id="submit-btn">Send reset link</button>
      </div>

      <a class="back-link" href="./index.html">← Back to login</a>
    </div>

    <script type="module">
      const params = new URLSearchParams(location.search);
      const apiBase = params.get("apiBase") ?? (location.port === "8080" ? "http://localhost:8080" : "http://localhost:3000");

      const statusEl = document.getElementById("status");
      const emailEl = document.getElementById("email");
      const submitBtn = document.getElementById("submit-btn");
      const formWrap = document.getElementById("form-wrap");

      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = `status ${type}`;
        statusEl.hidden = false;
      }

      submitBtn.addEventListener("click", async () => {
        const email = emailEl.value.trim();
        if (!email) {
          showStatus("Please enter your email address.", "error");
          return;
        }
        submitBtn.disabled = true;
        try {
          const res = await fetch(`${apiBase}/auth/forgot-password`, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ email })
          });
          // Always show the blind response message — never reveal account existence
          const data = await res.json().catch(() => ({}));
          formWrap.hidden = true;
          showStatus(data.message ?? "If an account exists for this email, a reset link has been sent.", "ok");
        } catch {
          showStatus("Network error — please try again.", "error");
          submitBtn.disabled = false;
        }
      });

      emailEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") submitBtn.click();
      });
    </script>
  </body>
</html>

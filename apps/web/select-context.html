<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/shared-app.css">
    <title>Select Context — Codex</title>
    <style>
      :root {
  --bg: #f5f7fa; --panel: #ffffff; --panel-2: #f9fafb;
  --border: #e5e7eb; --text: #111827; --muted: #6b7280;
  --accent: #2D6A9F; --accent-soft: rgba(45,106,159,0.10);
  --accent-2: #2563eb; --good: #16a34a; --warn: #d97706; --bad: #dc2626;
}
      *{box-sizing:border-box;}
      body{margin:0;font-family:"IBM Plex Sans",sans-serif;color:var(--text);background: var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;}
      .card{border-radius:22px;padding:32px;background:var(--panel);border:1px solid var(--border);width:100%;max-width:480px;}
      .eyebrow{display:inline-block;margin-bottom:8px;padding:5px 10px;border-radius:999px;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;background:var(--accent-soft);color:var(--accent-2);}
      h1{margin:8px 0 8px;font-size:1.4rem;}
      p.sub{margin:0 0 24px;font-size:14px;color:var(--muted);}
      .event-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
      .event-card{border-radius:14px;border:1px solid var(--border);padding:14px 16px;cursor:pointer;transition:border-color 0.15s,background 0.15s;background:var(--panel);}
      .event-card:hover{background:var(--accent-soft);border-color:rgba(45,106,159,0.3);}
      .event-card.selected{background:#fef3c7;border-color:var(--accent);}
      .event-card strong{display:block;margin-bottom:3px;}
      .event-card span{font-size:13px;color:var(--muted);}
      .badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;border:1px solid var(--border);font-size:11px;margin-left:8px;}
      .badge.live{color:var(--good);}
      .badge.draft,.badge.published{color:var(--warn);}
      .badge.closed,.badge.archived{color:var(--bad);}
      button.primary{width:100%;border:0;border-radius:12px;padding:13px;cursor:pointer;font:inherit;font-size:15px;font-weight:600;background:var(--accent);color:#fff;}
      button.primary:disabled{opacity:0.4;cursor:default;}
      .logout-link{display:block;text-align:center;margin-top:14px;font-size:13px;color:var(--muted);cursor:pointer;text-decoration:underline;}
      .status{padding:12px 14px;border-radius:12px;font-size:14px;margin-bottom:16px;}
      .status.error{background:#fee2e2;color:var(--bad);}
    </style>
  </head>
  <body>
    <div class="card">
      <div class="eyebrow">Codex</div>
      <h1>Choose your event</h1>
      <p class="sub">You have access to multiple events. Select one to continue.</p>
      <div id="status" hidden class="status error"></div>
      <div class="event-list" id="event-list">
        <div style="color:var(--muted);font-size:14px;">Loading events…</div>
      </div>
      <button class="primary" id="confirm-btn" disabled>Continue →</button>
      <span class="logout-link" id="logout-link">Sign out</span>
    </div>

    <script type="module">
      import { setToken, setActiveEventId, logoutUser } from "./components.js";

      const params = new URLSearchParams(location.search);
      const apiBase = params.get("apiBase") ?? window.location.origin;
      const token = params.get("token") ?? localStorage.getItem("codex.token");

      // Events can come from query param (set by login) or fetched live
      let eventsRaw = null;
      try { eventsRaw = params.get("events") ? JSON.parse(params.get("events")) : null; } catch {}

      let selectedEventId = null;
      const listEl = document.getElementById("event-list");
      const confirmBtn = document.getElementById("confirm-btn");
      const statusEl = document.getElementById("status");

      function renderEvents(events) {
        if (!events.length) {
          listEl.innerHTML = `<div style="color:var(--muted);font-size:14px;">No events available.</div>`;
          return;
        }
        listEl.innerHTML = events.map(ev => `
          <div class="event-card" data-id="${esc(ev.id)}">
            <strong>${esc(ev.name)}<span class="badge ${esc(ev.status)}">${esc(ev.status)}</span></strong>
            <span>${ev.starts_at ? new Date(ev.starts_at).toLocaleDateString() : ""}${ev.ends_at ? " – " + new Date(ev.ends_at).toLocaleDateString() : ""}</span>
          </div>
        `).join("");

        listEl.querySelectorAll(".event-card").forEach(card => {
          card.addEventListener("click", () => {
            listEl.querySelectorAll(".event-card").forEach(c => c.classList.remove("selected"));
            card.classList.add("selected");
            selectedEventId = card.dataset.id;
            confirmBtn.disabled = false;
          });
        });
      }

      function esc(s) { return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

      async function loadEvents() {
        if (eventsRaw) { renderEvents(eventsRaw); return; }
        try {
          const res = await fetch(`${apiBase}/events`, {
            headers: { authorization: `Bearer ${token}` }
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error ?? "Failed to load events");
          renderEvents(data.events ?? []);
        } catch (err) {
          statusEl.textContent = err.message;
          statusEl.hidden = false;
          listEl.innerHTML = "";
        }
      }

      confirmBtn.addEventListener("click", () => {
        if (!selectedEventId) return;
        if (token) setToken(token);
        setActiveEventId(selectedEventId);
        // Determine role from JWT to route to correct page
        let role = "organizer_admin";
        try { role = JSON.parse(atob(token.split(".")[1])).role ?? role; } catch {}
        const ROLE_PAGES = { organizer_admin: "organizer.html", sponsor_user: "sponsor.html", vendor_manager: "vendor.html", ops_user: "ops/fleet.html" };
        const page = ROLE_PAGES[role] || "organizer.html";
        location.href = `${page}?eventId=${encodeURIComponent(selectedEventId)}&apiBase=${encodeURIComponent(apiBase)}`;
      });

      document.getElementById("logout-link").addEventListener("click", () => {
        logoutUser("/login");
      });

      loadEvents();
    </script>
  </body>
</html>

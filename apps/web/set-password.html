<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Set password — Codex</title>
    <style>
      :root {
        --bg: #101117;
        --panel: #1a1c25;
        --panel-2: #14161d;
        --border: rgba(255,255,255,0.08);
        --text: #f4f1ea;
        --muted: #b2ac9f;
        --accent: #f3c97d;
        --accent-2: #9fd3c7;
        --good: #9fd3c7;
        --warn: #f3c97d;
        --bad: #ff9f9f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(243, 201, 125, 0.16), transparent 28%),
          linear-gradient(160deg, var(--bg), #090a0e 66%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        border-radius: 22px;
        padding: 32px;
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid var(--border);
        width: 100%;
        max-width: 440px;
        margin: 24px;
      }
      .eyebrow {
        display: inline-block;
        margin-bottom: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: rgba(159, 211, 199, 0.12);
        color: var(--accent-2);
      }
      h1 { margin: 0 0 6px; font-size: 1.4rem; }
      .muted { color: var(--muted); }
      .status {
        margin-bottom: 16px;
        padding: 12px 14px;
        border-radius: 14px;
        font-size: 14px;
      }
      .status.ok { background: rgba(159, 211, 199, 0.16); color: var(--good); }
      .status.error { background: rgba(255, 159, 159, 0.12); color: var(--bad); }
      .field { margin-bottom: 16px; }
      .field label {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.04);
        color: var(--text);
        padding: 11px 12px;
        font: inherit;
        font-size: 15px;
      }
      input:focus { outline: 2px solid var(--accent); border-color: transparent; }
      button {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 13px;
        cursor: pointer;
        font: inherit;
        font-size: 15px;
        font-weight: 600;
      }
      button.primary { background: var(--accent); color: #211503; }
      button:disabled { opacity: 0.4; cursor: default; }
      .hint {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
        line-height: 1.5;
      }
      .loading { text-align: center; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="eyebrow">Account setup</div>
      <h1>Set your password</h1>
      <p class="muted" id="subtitle">Loading invite details…</p>

      <div id="status" hidden class="status"></div>

      <div id="form-wrap">
        <div class="field">
          <label>Full name</label>
          <input type="text" id="full-name" readonly>
        </div>
        <div class="field">
          <label>Email address</label>
          <input type="email" id="email" readonly>
        </div>
        <div class="field">
          <label>New password</label>
          <input type="password" id="password" autocomplete="new-password" placeholder="Min 10 characters">
          <p class="hint">Must be at least 10 characters and include uppercase, lowercase, a number, and a special character.</p>
        </div>
        <div class="field">
          <label>Confirm password</label>
          <input type="password" id="confirm-password" autocomplete="new-password">
        </div>
        <button class="primary" id="submit-btn" disabled>Activate account</button>
      </div>
    </div>

    <script type="module">
      const params = new URLSearchParams(location.search);
      const token = params.get("token") ?? "";
      const apiBase = params.get("apiBase") ?? (location.port === "8080" ? "http://localhost:8080" : "http://localhost:3000");

      const statusEl = document.getElementById("status");
      const subtitleEl = document.getElementById("subtitle");
      const fullNameEl = document.getElementById("full-name");
      const emailEl = document.getElementById("email");
      const passwordEl = document.getElementById("password");
      const confirmEl = document.getElementById("confirm-password");
      const submitBtn = document.getElementById("submit-btn");

      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = `status ${type}`;
        statusEl.hidden = false;
      }

      async function loadInviteInfo() {
        if (!token) {
          showStatus("No invite token found in URL.", "error");
          return;
        }
        try {
          const res = await fetch(`${apiBase}/auth/invite-info?token=${encodeURIComponent(token)}`);
          if (res.status === 404) {
            showStatus("This invite link has expired or already been used.", "error");
            document.getElementById("form-wrap").hidden = true;
            return;
          }
          if (!res.ok) {
            showStatus("Unable to load invite details.", "error");
            return;
          }
          const data = await res.json();
          fullNameEl.value = data.full_name ?? "";
          emailEl.value = data.email ?? "";
          subtitleEl.textContent = `Welcome, ${data.full_name}. Set a password to activate your account.`;
          submitBtn.disabled = false;
        } catch {
          showStatus("Network error — please refresh and try again.", "error");
        }
      }

      submitBtn.addEventListener("click", async () => {
        statusEl.hidden = true;
        const password = passwordEl.value;
        const confirm = confirmEl.value;
        if (!password) {
          showStatus("Please enter a password.", "error");
          return;
        }
        if (password !== confirm) {
          showStatus("Passwords do not match.", "error");
          return;
        }
        submitBtn.disabled = true;
        try {
          const res = await fetch(`${apiBase}/auth/accept-invite`, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ token, password })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            if (data.details?.message) {
              showStatus(`Password requirements not met: ${data.details.message}`, "error");
            } else if (res.status === 400 && data.error?.includes("INVITE_TOKEN")) {
              showStatus("This invite link has expired or already been used.", "error");
            } else {
              showStatus(data.error ?? "Failed to activate account.", "error");
            }
            submitBtn.disabled = false;
            return;
          }
          showStatus("Account activated! Redirecting…", "ok");
          if (data.redirect_url) {
            setTimeout(() => { location.href = data.redirect_url; }, 1200);
          }
        } catch {
          showStatus("Network error — please try again.", "error");
          submitBtn.disabled = false;
        }
      });

      loadInviteInfo();
    </script>
  </body>
</html>

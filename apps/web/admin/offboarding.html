<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../shared.css">
    <title>Tenant Offboarding — Platform Admin</title>
    <style>
      :root{--bg:#101117;--panel:#1a1c25;--panel-2:#14161d;--border:rgba(255,255,255,0.08);--text:#f4f1ea;--muted:#b2ac9f;--accent:#f3c97d;--accent-2:#9fd3c7;--good:#9fd3c7;--warn:#f3c97d;--bad:#ff9f9f;}
      *{box-sizing:border-box;}
      body{margin:0;font-family:"IBM Plex Sans",sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(243,201,125,0.16),transparent 28%),linear-gradient(160deg,var(--bg),#090a0e 66%);min-height:100vh;}
      .shell{max-width:1440px;margin:0 auto;padding:18px 24px 0;}
      .shell-bar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
      .shell-title{display:grid;gap:4px;}
      .shell-title strong{font-size:1.1rem;}
      .shell-nav{display:flex;gap:10px;flex-wrap:wrap;}
      .shell-nav a{display:inline-flex;align-items:center;padding:10px 13px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);text-decoration:none;font-size:14px;}
      .eyebrow{display:inline-block;margin-bottom:8px;padding:5px 10px;border-radius:999px;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;background:rgba(159,211,199,0.12);color:var(--accent-2);}
      main{max-width:680px;margin:0 auto;padding:0 24px 24px;}
      .card{border-radius:22px;padding:28px;background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--border);margin-bottom:18px;}
      .status{padding:12px 14px;border-radius:14px;font-size:14px;margin-bottom:14px;}
      .status.ok{background:rgba(159,211,199,0.16);color:var(--good);}
      .status.error{background:rgba(255,159,159,0.12);color:var(--bad);}
      .status.warn{background:rgba(243,201,125,0.14);color:var(--warn);}
      button{border:0;border-radius:12px;padding:10px 16px;cursor:pointer;font:inherit;font-size:14px;}
      button.primary{background:var(--accent);color:#211503;font-weight:600;}
      button.secondary{background:rgba(255,255,255,0.1);color:var(--text);}
      button.bad{background:rgba(255,159,159,0.14);color:var(--bad);}
      button:disabled{opacity:0.4;cursor:default;}
      input,select{width:100%;border-radius:12px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:var(--text);padding:10px 12px;font:inherit;}
      input:focus,select:focus{outline:2px solid var(--accent);border-color:transparent;}
      .field{margin-bottom:16px;}
      .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px;}
      .step-indicator{display:flex;gap:8px;margin-bottom:24px;align-items:center;}
      .step{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:rgba(255,255,255,0.08);color:var(--muted);}
      .step.active{background:var(--accent);color:#211503;}
      .step.done{background:var(--good);color:#0a1f1b;}
      .step-sep{flex:1;height:2px;background:var(--border);max-width:40px;}
      .radio-option{border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;cursor:pointer;}
      .radio-option:has(input:checked){border-color:var(--accent);background:rgba(243,201,125,0.07);}
      .radio-option label{cursor:pointer;display:flex;gap:12px;align-items:flex-start;}
      .radio-option input[type=radio]{margin-top:2px;width:16px;height:16px;flex-shrink:0;}
      .radio-option strong{display:block;margin-bottom:3px;}
      .radio-option span{font-size:13px;color:var(--muted);}
      .detail-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
      .detail-row:last-child{border-bottom:none;}
      .detail-row label{min-width:140px;font-size:13px;color:var(--muted);}
      .badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;border:1px solid var(--border);font-size:12px;}
      .badge.awaiting_approval{color:var(--warn);}
      .badge.deletion_in_progress,.badge.export_in_progress{color:var(--accent);}
      .badge.completed{color:var(--good);}
      .badge.failed{color:var(--bad);}
      .modal-actions{display:flex;gap:10px;margin-top:20px;}
      .modal-actions button{flex:1;}
      #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--good);color:#0a1f1b;padding:12px 20px;border-radius:14px;font-weight:600;font-size:14px;opacity:0;transition:opacity 0.2s;z-index:9999;pointer-events:none;}
      #toast.show{opacity:1;}
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="shell-bar">
        <div class="shell-title">
          <div class="eyebrow">Platform Admin</div>
          <strong id="page-title">Tenant Offboarding</strong>
          <span class="muted" id="page-sub">Loading…</span>
        </div>
        <nav class="shell-nav">
          <a href="#" id="back-link">← Tenant Detail</a>
          <a href="#" id="logout-link" style="color:var(--bad)">Sign out</a>
        </nav>
      </div>
    </div>

    <main>
      <div id="global-status" hidden class="status"></div>

      <!-- Step wizard -->
      <div class="card" id="wizard-card">
        <div class="step-indicator" id="step-indicator">
          <div class="step active" id="s1">1</div>
          <div class="step-sep"></div>
          <div class="step" id="s2">2</div>
          <div class="step-sep"></div>
          <div class="step" id="s3">3</div>
        </div>
        <div id="step-content"><!-- rendered by JS --></div>
      </div>

      <!-- Post-submit status polling -->
      <div id="result-card" class="card" hidden>
        <div class="eyebrow">Offboarding Initiated</div>
        <h2 style="margin:8px 0 16px;">Awaiting second administrator approval</h2>
        <div class="status warn">
          Offboarding initiated. A second administrator must approve before deletion begins.
        </div>
        <div class="detail-row"><label>Job ID</label><span id="res-job-id" style="font-family:monospace;font-size:13px;"></span></div>
        <div class="detail-row"><label>Status</label><span id="res-status-badge"></span></div>
        <div class="detail-row"><label>Last Updated</label><span id="res-updated" class="muted"></span></div>
        <p class="muted" style="font-size:13px;margin-top:16px;">Status updates automatically every 10 seconds.</p>
      </div>
    </main>

    <div id="toast"></div>

    <script type="module">
      import { isAuthenticated, logoutUser } from "../components.js";
      if (!isAuthenticated()) { logoutUser("/login"); throw new Error("unauthenticated"); }

      const params = new URLSearchParams(location.search);
      const apiBase = params.get("apiBase") ?? window.location.origin;
      const token = params.get("token") ?? localStorage.getItem("codex.token") ?? "platform-token";
      const tenantId = params.get("tenantId") ?? "";

      document.getElementById("logout-link").addEventListener("click", (e) => { e.preventDefault(); logoutUser("/login"); });
      document.getElementById("back-link").href = `tenant-detail.html?tenantId=${encodeURIComponent(tenantId)}&token=${encodeURIComponent(token)}&apiBase=${encodeURIComponent(apiBase)}`;

      function esc(s) { return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
      function fmt(iso) { return iso ? new Date(iso).toLocaleString() : "—"; }
      function toast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg; el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 2800);
      }

      async function api(path, options = {}) {
        const res = await fetch(`${apiBase}${path}`, {
          method: options.method ?? "GET",
          headers: { "content-type": "application/json", authorization: `Bearer ${token}` },
          body: options.body ? JSON.stringify(options.body) : undefined
        });
        const payload = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(payload.error ?? `Request failed: ${res.status}`);
        return payload;
      }

      let tenantData = null;
      let currentStep = 1;
      let selectedPath = "";
      let gracePeriodDays = 30;
      let pollHandle = null;

      function setStep(n) {
        currentStep = n;
        [1,2,3].forEach(i => {
          document.getElementById(`s${i}`).className = `step ${i < n ? "done" : i === n ? "active" : ""}`;
          if (i < n) document.getElementById(`s${i}`).textContent = "✓";
          else document.getElementById(`s${i}`).textContent = String(i);
        });
        renderStepContent();
      }

      function renderStepContent() {
        const container = document.getElementById("step-content");
        if (currentStep === 1) {
          container.innerHTML = `
            <div class="eyebrow">Step 1 of 3</div>
            <h2 style="margin:8px 0 16px;">Confirm Intent</h2>
            <div class="status warn">
              <strong>⚠ Warning:</strong> This action will begin the data deletion process.
              It cannot be undone without contacting support.
            </div>
            <div id="tenant-info" style="margin-bottom:20px;">
              <div class="detail-row"><label>Tenant</label><span id="t-name">${esc(tenantData?.name ?? "—")}</span></div>
              <div class="detail-row"><label>Slug</label><span style="font-family:monospace;color:var(--muted);">${esc(tenantData?.slug ?? "—")}</span></div>
              <div class="detail-row"><label>Status</label><span class="badge">${esc(tenantData?.status ?? "—")}</span></div>
            </div>
            <div class="field">
              <label>Type the tenant slug to confirm: <strong style="color:var(--accent);">${esc(tenantData?.slug ?? "")}</strong></label>
              <input type="text" id="slug-confirm" placeholder="${esc(tenantData?.slug ?? "")}" autocomplete="off">
            </div>
            <div class="modal-actions">
              <button class="bad" id="step1-next" disabled>Next →</button>
            </div>
          `;
          const slugInput = container.querySelector("#slug-confirm");
          const nextBtn = container.querySelector("#step1-next");
          slugInput.addEventListener("input", () => {
            nextBtn.disabled = slugInput.value !== tenantData?.slug;
          });
          nextBtn.addEventListener("click", () => setStep(2));
        } else if (currentStep === 2) {
          container.innerHTML = `
            <div class="eyebrow">Step 2 of 3</div>
            <h2 style="margin:8px 0 16px;">Select Data Handling Path</h2>
            <div class="radio-option">
              <label><input type="radio" name="path" value="export_then_delete" ${selectedPath === "export_then_delete" ? "checked" : ""}>
                <div><strong>Export then Delete</strong><span>Generate a full data export for the organizer. Deletion begins after they confirm receipt.</span></div>
              </label>
            </div>
            <div class="radio-option">
              <label><input type="radio" name="path" value="immediate_delete" ${selectedPath === "immediate_delete" ? "checked" : ""}>
                <div><strong>Immediate Delete</strong><span>Permanently delete all PII immediately. No export. Requires second administrator approval.</span></div>
              </label>
            </div>
            <div class="radio-option">
              <label><input type="radio" name="path" value="grace_period_delete" ${selectedPath === "grace_period_delete" ? "checked" : ""}>
                <div><strong>Grace Period</strong><span>Retain data for a defined period then auto-delete.</span></div>
              </label>
            </div>
            <div id="grace-period-wrap" style="${selectedPath === "grace_period_delete" ? "" : "display:none;"};margin-top:12px;">
              <div class="field">
                <label>Grace period</label>
                <select id="grace-days">
                  <option value="30" ${gracePeriodDays === 30 ? "selected" : ""}>30 days</option>
                  <option value="60" ${gracePeriodDays === 60 ? "selected" : ""}>60 days</option>
                  <option value="90" ${gracePeriodDays === 90 ? "selected" : ""}>90 days</option>
                </select>
              </div>
            </div>
            <div class="modal-actions">
              <button class="bad" id="step2-next">Next →</button>
              <button class="secondary" id="step2-back">← Back</button>
            </div>
          `;
          container.querySelectorAll("input[name=path]").forEach(r => {
            r.addEventListener("change", () => {
              selectedPath = r.value;
              document.getElementById("grace-period-wrap").style.display = r.value === "grace_period_delete" ? "" : "none";
            });
          });
          container.querySelector("#grace-days")?.addEventListener("change", e => { gracePeriodDays = parseInt(e.target.value); });
          container.querySelector("#step2-back").addEventListener("click", () => setStep(1));
          container.querySelector("#step2-next").addEventListener("click", () => {
            const chosen = container.querySelector("input[name=path]:checked");
            if (!chosen) { alert("Please select a data handling path."); return; }
            selectedPath = chosen.value;
            if (selectedPath === "grace_period_delete") {
              gracePeriodDays = parseInt(container.querySelector("#grace-days")?.value ?? "30");
            }
            setStep(3);
          });
        } else if (currentStep === 3) {
          const pathLabels = {
            export_then_delete: "Export then Delete",
            immediate_delete: "Immediate Delete",
            grace_period_delete: `Grace Period — ${gracePeriodDays} days`
          };
          container.innerHTML = `
            <div class="eyebrow">Step 3 of 3</div>
            <h2 style="margin:8px 0 16px;">Review and Execute</h2>
            <div class="detail-row"><label>Tenant</label><strong>${esc(tenantData?.name ?? "—")}</strong></div>
            <div class="detail-row"><label>Slug</label><span style="font-family:monospace;color:var(--muted);">${esc(tenantData?.slug ?? "—")}</span></div>
            <div class="detail-row"><label>Data handling</label><span class="badge">${esc(pathLabels[selectedPath] ?? selectedPath)}</span></div>
            ${selectedPath === "grace_period_delete"
              ? `<div class="detail-row"><label>Deletion date</label><span class="muted">~${new Date(Date.now() + gracePeriodDays * 86400000).toLocaleDateString()}</span></div>`
              : ""}
            <div class="status warn" style="margin-top:16px;">
              Once executed, this action will enter the offboarding workflow and require a second platform administrator to approve before deletion proceeds.
            </div>
            <div id="step3-error" hidden class="status error"></div>
            <div class="modal-actions">
              <button class="bad" id="execute-btn">Execute Offboarding</button>
              <button class="secondary" id="step3-back">← Back</button>
            </div>
          `;
          container.querySelector("#step3-back").addEventListener("click", () => setStep(2));
          container.querySelector("#execute-btn").addEventListener("click", async () => {
            const btn = container.querySelector("#execute-btn");
            const errEl = container.querySelector("#step3-error");
            btn.disabled = true;
            errEl.hidden = true;
            try {
              const body = {
                data_handling_path: selectedPath,
                confirm_tenant_slug: tenantData.slug
              };
              if (selectedPath === "grace_period_delete") body.grace_period_days = gracePeriodDays;
              const data = await api(`/admin/tenants/${encodeURIComponent(tenantId)}/offboard`, { method: "POST", body });
              document.getElementById("wizard-card").hidden = true;
              document.getElementById("result-card").hidden = false;
              document.getElementById("res-job-id").textContent = data.job_id;
              document.getElementById("res-status-badge").innerHTML = `<span class="badge ${esc(data.status)}">${esc(data.status)}</span>`;
              document.getElementById("res-updated").textContent = fmt(new Date().toISOString());
              toast("Offboarding initiated");
              startStatusPoll(data.job_id);
            } catch (err) {
              errEl.textContent = err.message; errEl.hidden = false;
              btn.disabled = false;
            }
          });
        }
      }

      function startStatusPoll(jobId) {
        if (pollHandle) clearInterval(pollHandle);
        pollHandle = setInterval(async () => {
          try {
            const data = await api(`/admin/tenants/${encodeURIComponent(tenantId)}/offboard/status`);
            const job = (data.jobs ?? []).find(j => j.id === jobId) ?? data;
            if (job?.status) {
              document.getElementById("res-status-badge").innerHTML = `<span class="badge ${esc(job.status)}">${esc(job.status)}</span>`;
              document.getElementById("res-updated").textContent = fmt(new Date().toISOString());
              if (job.status === "completed" || job.status === "failed") clearInterval(pollHandle);
            }
          } catch {}
        }, 10000);
      }

      async function loadTenant() {
        try {
          const data = await api(`/admin/tenants/${encodeURIComponent(tenantId)}`);
          tenantData = data.tenant ?? data;
          document.getElementById("page-title").textContent = `Offboarding — ${tenantData.name}`;
          document.getElementById("page-sub").textContent = tenantData.slug;
          setStep(1);
        } catch (err) {
          const el = document.getElementById("global-status");
          el.textContent = err.message; el.className = "status error"; el.hidden = false;
        }
      }

      if (tenantId) {
        loadTenant();
      } else {
        document.getElementById("step-content").innerHTML = `<div class="empty" style="color:var(--bad);">No tenantId in URL</div>`;
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/shared-app.css">
    <title>My account — Codex</title>
    <style>
      :root {
  --bg: #f5f7fa; --panel: #ffffff; --panel-2: #f9fafb;
  --border: #e5e7eb; --text: #111827; --muted: #6b7280;
  --accent: #2D6A9F; --accent-soft: rgba(45,106,159,0.10);
  --accent-2: #2563eb; --good: #16a34a; --warn: #d97706; --bad: #dc2626;
}
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", sans-serif;
        color: var(--text);
        background: var(--bg);
        min-height: 100vh;
      }
      .shell {
        max-width: 1440px;
        margin: 0 auto;
        padding: 18px 24px 0;
      }
      .shell-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }
      .shell-title { display: grid; gap: 6px; }
      .shell-title strong { font-size: 1.1rem; }
      .eyebrow {
        display: inline-block;
        margin-bottom: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: rgba(45,106,159,0.10);
        color: var(--accent-2);
      }
      main {
        max-width: 700px;
        margin: 0 auto;
        padding: 24px;
        display: grid;
        gap: 18px;
      }
      .card {
        border-radius: 22px;
        padding: 24px;
        background: var(--panel);
        border: 1px solid var(--border);
      }
      .muted { color: var(--muted); }
      .status {
        margin-bottom: 16px;
        padding: 12px 14px;
        border-radius: 14px;
        font-size: 14px;
      }
      .status.ok { background: #dcfce7; color: var(--good); }
      .status.error { background: #fee2e2; color: var(--bad); }
      .field { margin-bottom: 14px; }
      .field label {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 5px;
      }
      input, select {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 11px 12px;
        font: inherit;
      }
      input:focus { outline: 2px solid var(--accent); border-color: transparent; }
      button {
        border: 0;
        border-radius: 12px;
        padding: 11px 18px;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
      }
      button.primary { background: var(--accent); color: #fff; }
      button.secondary { background: var(--panel-2); color: var(--text); }
      button.bad { background: #fee2e2; color: var(--bad); }
      button:disabled { opacity: 0.4; cursor: default; }
      .detail-row {
        display: flex;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
        align-items: baseline;
      }
      .detail-row:last-child { border-bottom: none; }
      .detail-row label { min-width: 120px; font-size: 13px; color: var(--muted); }
      .detail-row span { flex: 1; }
      .pill {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        font-size: 12px;
        margin-right: 4px;
      }
      .status-pill.active { color: var(--good); }
      .status-pill.pending_invite { color: var(--warn); }
      .status-pill.disabled { color: var(--bad); }
      .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
      /* Modal overlay */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9000;
      }
      .modal-panel {
        background: var(--panel);
        border-radius: 22px;
        border: 1px solid var(--border);
        padding: 28px;
        max-width: 440px;
        width: 90%;
      }
      .hint { font-size: 12px; color: var(--muted); margin-top: 5px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="shell-bar">
        <div class="shell-title">
          <div class="eyebrow">My account</div>
          <strong>Account &amp; security settings</strong>
          <span class="muted">Manage your profile and credentials.</span>
        </div>
      </div>
    </div>

    <main>
      <div class="card">
        <div class="eyebrow">Profile</div>
        <div id="profile-status" hidden class="status"></div>
        <div id="profile-view">
          <div class="detail-row"><label>Full name</label><span id="p-name">—</span></div>
          <div class="detail-row"><label>Email</label><span id="p-email">—</span></div>
          <div class="detail-row"><label>Status</label><span id="p-status">—</span></div>
          <div class="detail-row"><label>Organisation</label><span id="p-org">—</span></div>
          <div class="detail-row"><label>Roles</label><span id="p-roles">—</span></div>
          <div class="detail-row"><label>Last login</label><span id="p-last-login" class="muted">—</span></div>
          <div class="actions">
            <button class="secondary" id="edit-name-btn">Edit name</button>
            <button class="secondary" id="change-password-btn">Change password</button>
          </div>
        </div>
        <div id="edit-name-wrap" hidden style="margin-top:16px;">
          <div class="field">
            <label>Full name</label>
            <input type="text" id="name-input" maxlength="100">
          </div>
          <div style="display:flex;gap:10px;">
            <button class="primary" id="save-name-btn">Save</button>
            <button class="secondary" id="cancel-name-btn">Cancel</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="eyebrow">Session</div>
        <p class="muted">Your current session is managed by the Codex platform. Navigating away or closing the browser will end your session.</p>
        <div class="actions">
          <button class="bad" id="sign-out-btn">Sign out</button>
        </div>
      </div>
    </main>

    <!-- Change Password Modal (hidden, injected on demand) -->
    <script type="module">
      const params = new URLSearchParams(location.search);
      const apiBase = params.get("apiBase") ?? window.location.origin;
      const token = params.get("token") ?? localStorage.getItem("codex.token") ?? "";

      const authHeaders = () => ({
        "content-type": "application/json",
        ...(token ? { authorization: `Bearer ${token}` } : {})
      });

      function showProfileStatus(msg, type) {
        const el = document.getElementById("profile-status");
        el.textContent = msg;
        el.className = `status ${type}`;
        el.hidden = false;
      }

      async function loadProfile() {
        try {
          const res = await fetch(`${apiBase}/auth/me/profile`, {
            headers: authHeaders()
          });
          if (!res.ok) {
            showProfileStatus("Unable to load profile — are you logged in?", "error");
            return;
          }
          const data = await res.json();
          document.getElementById("p-name").textContent = data.full_name ?? "—";
          document.getElementById("p-email").textContent = data.email ?? "—";
          document.getElementById("p-org").textContent = data.org_name ?? "—";
          document.getElementById("p-last-login").textContent = data.last_login_at
            ? new Date(data.last_login_at).toLocaleString()
            : "Never";
          const statusPill = `<span class="status-pill ${data.status}">${data.status === "active" ? "Active" : data.status === "pending_invite" ? "Pending" : "Disabled"}</span>`;
          document.getElementById("p-status").innerHTML = statusPill;
          const roles = (data.roles ?? []).map((r) => `<span class="pill">${r}</span>`).join("");
          document.getElementById("p-roles").innerHTML = roles || "—";
          document.getElementById("name-input").value = data.full_name ?? "";
        } catch {
          showProfileStatus("Network error loading profile.", "error");
        }
      }

      document.getElementById("edit-name-btn").addEventListener("click", () => {
        document.getElementById("edit-name-wrap").hidden = false;
        document.getElementById("name-input").focus();
      });

      document.getElementById("cancel-name-btn").addEventListener("click", () => {
        document.getElementById("edit-name-wrap").hidden = true;
        document.getElementById("profile-status").hidden = true;
      });

      document.getElementById("save-name-btn").addEventListener("click", async () => {
        const full_name = document.getElementById("name-input").value.trim();
        if (!full_name) {
          showProfileStatus("Name cannot be empty.", "error");
          return;
        }
        try {
          const res = await fetch(`${apiBase}/auth/me`, {
            method: "PATCH",
            headers: authHeaders(),
            body: JSON.stringify({ full_name })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            showProfileStatus(data.error ?? "Failed to update name.", "error");
            return;
          }
          document.getElementById("p-name").textContent = data.full_name ?? full_name;
          document.getElementById("edit-name-wrap").hidden = true;
          showProfileStatus("Name updated successfully.", "ok");
        } catch {
          showProfileStatus("Network error — please try again.", "error");
        }
      });

      document.getElementById("change-password-btn").addEventListener("click", () => {
        showChangePasswordModal();
      });

      document.getElementById("sign-out-btn").addEventListener("click", () => {
        localStorage.removeItem("codex.token");
        localStorage.removeItem("codex.active_event_id");
        location.href = "/login";
      });

      function showChangePasswordModal() {
        const overlay = document.createElement("div");
        overlay.className = "modal-overlay";
        overlay.innerHTML = `
          <div class="modal-panel">
            <div class="eyebrow">Security</div>
            <h2 style="margin:8px 0 16px;">Change password</h2>
            <div id="cp-status" hidden class="status"></div>
            <div class="field">
              <label>Current password</label>
              <input type="password" id="cp-current" autocomplete="current-password">
            </div>
            <div class="field">
              <label>New password</label>
              <input type="password" id="cp-new" autocomplete="new-password" placeholder="Min 10 characters">
              <p class="hint">At least 10 chars with uppercase, lowercase, number, and special character.</p>
            </div>
            <div class="field">
              <label>Confirm new password</label>
              <input type="password" id="cp-confirm" autocomplete="new-password">
            </div>
            <div style="display:flex;gap:10px;margin-top:6px;">
              <button class="primary" id="cp-submit" style="flex:1;">Update password</button>
              <button class="secondary" id="cp-cancel" style="flex:1;">Cancel</button>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);

        overlay.querySelector("#cp-cancel").addEventListener("click", () => overlay.remove());

        overlay.querySelector("#cp-submit").addEventListener("click", async () => {
          const cpStatus = overlay.querySelector("#cp-status");
          const current_password = overlay.querySelector("#cp-current").value;
          const new_password = overlay.querySelector("#cp-new").value;
          const confirm = overlay.querySelector("#cp-confirm").value;

          cpStatus.hidden = true;
          if (!current_password || !new_password) {
            cpStatus.textContent = "All fields are required.";
            cpStatus.className = "status error";
            cpStatus.hidden = false;
            return;
          }
          if (new_password !== confirm) {
            cpStatus.textContent = "New passwords do not match.";
            cpStatus.className = "status error";
            cpStatus.hidden = false;
            return;
          }
          const submitBtn = overlay.querySelector("#cp-submit");
          submitBtn.disabled = true;
          try {
            const res = await fetch(`${apiBase}/auth/change-password`, {
              method: "POST",
              headers: authHeaders(),
              body: JSON.stringify({ current_password, new_password })
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
              if (data.error?.includes("CURRENT_PASSWORD_INCORRECT")) {
                cpStatus.textContent = "Current password is incorrect.";
              } else if (data.details?.message) {
                cpStatus.textContent = `Password requirements not met: ${data.details.message}`;
              } else {
                cpStatus.textContent = data.error ?? "Failed to change password.";
              }
              cpStatus.className = "status error";
              cpStatus.hidden = false;
              submitBtn.disabled = false;
              return;
            }
            overlay.remove();
            showProfileStatus("Password changed successfully.", "ok");
          } catch {
            cpStatus.textContent = "Network error — please try again.";
            cpStatus.className = "status error";
            cpStatus.hidden = false;
            submitBtn.disabled = false;
          }
        });
      }

      loadProfile();
    </script>
  </body>
</html>

version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: pilot-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pilot_platform
      POSTGRES_USER: pilot
      POSTGRES_PASSWORD: pilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pilot -d pilot_platform"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:

services:
  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./api.env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/ready').then((r) => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
  notification-worker:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./api.env
    command: ["node", "apps/api/src/scripts/run-notification-worker-scheduler.mjs"]
    depends_on:
      api:
        condition: service_healthy
